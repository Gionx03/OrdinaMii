services:
  postgres:
    image: postgres:16
    container_name: ordinamii_postgres
    environment:
      POSTGRES_DB: OrdinaMii
      POSTGRES_USER: ${db.username}
      POSTGRES_PASSWORD: ${db.password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: